name: Deploy FTP (pure-ftpd, robust)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_SERVER_IP: ${{ secrets.FTP_SERVER_IP }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: FTP_USER,FTP_PASS,FTP_SERVER_IP
          script: |
            set -euo pipefail

            IMAGE="crazymax/pure-ftpd:latest"
            NAME="ftp"
            CTRL_HOST_PORT="2121"
            CTRL_CONTAINER_PORT="2100"   # image binds here by default in logs [5](https://deepwiki.com/fauria/docker-vsftpd/2.1-basic-setup-with-docker-run)
            PASV_RANGE="30000:30009"

            echo "[1/7] Create volumes (idempotent)"
            docker volume create ftpdata >/dev/null 2>&1 || true
            docker volume create ftpdb   >/dev/null 2>&1 || true

            echo "[2/7] Pull image"
            docker pull "$IMAGE"

            echo "[3/7] Replace container"
            docker rm -f "$NAME" >/dev/null 2>&1 || true

            docker run -d \
              --name "$NAME" \
              -p "${CTRL_HOST_PORT}:${CTRL_CONTAINER_PORT}" \
              -p "30000-30009:30000-30009" \
              -e "AUTH_METHOD=puredb" \
              -e "PASSIVE_IP=${FTP_SERVER_IP}" \
              -e "PASSIVE_PORT_RANGE=${PASV_RANGE}" \
              -v ftpdata:/home/ftpusers \
              -v ftpdb:/data \
              "$IMAGE"

            echo "[4/7] Wait for container init to finish (short, deterministic)"
            # s6 overlay init är snabb; vi väntar bara tills pure-ftpd-processen syns
            for i in $(seq 1 30); do
              if docker exec "$NAME" sh -lc "pgrep -f pure-ftpd >/dev/null 2>&1"; then
                break
              fi
              sleep 1
            done

            echo "[5/7] Ensure ftpuser UID (fallback to 1000 if missing)"
            FTP_UID="$(docker exec "$NAME" sh -lc 'id -u ftpuser 2>/dev/null || echo 1000')"

            echo "[6/7] Create-or-update FTP user in PureDB"
            if docker exec "$NAME" sh -lc "pure-pw show \"${FTP_USER}\" >/dev/null 2>&1"; then
              echo "User exists -> updating password"
              printf '%s\n%s\n' "${FTP_PASS}" "${FTP_PASS}" | \
                docker exec -i "$NAME" sh -lc "pure-pw passwd \"${FTP_USER}\" -m"
            else
              echo "User missing -> creating user"
              printf '%s\n%s\n' "${FTP_PASS}" "${FTP_PASS}" | \
                docker exec -i "$NAME" sh -lc "pure-pw useradd \"${FTP_USER}\" -u ${FTP_UID} -d /home/ftpusers -m"
            fi

            echo "[7/7] Verify user present (fail deploy if not)"
            docker exec "$NAME" sh -lc "pure-pw list | grep -Fx \"${FTP_USER}\" >/dev/null"

            echo "✅ FTP deploy OK. Control port: ${CTRL_HOST_PORT}, passive: 30000-30009"
            echo "Tip: check logs with: docker logs ${NAME} | tail -n 50"
