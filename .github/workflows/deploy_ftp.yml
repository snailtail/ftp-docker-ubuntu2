name: Deploy FTP server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker rm -f ftp || true
            docker pull fauria/vsftpd

            docker run -d \
              --name ftp \
              -p 2121:21 \
              -p 30000-30010:30000-30010 \
              -e FTP_USER=${{ secrets.FTP_USER }} \
              -e FTP_PASS=${{ secrets.FTP_PASS }} \
              -e PASV_ENABLE=YES \
              -e PASV_MIN_PORT=30000 \
              -e PASV_MAX_PORT=30010 \
              -e PASV_ADDRESS=${{ secrets.FTP_SERVER_IP }} \
              -v /srv/ftp:/home/vsftpd \
              fauria/vsftpd
