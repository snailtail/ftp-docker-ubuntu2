name: Deploy FTP (pure-ftpd, ARM-safe)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy FTP container over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            docker volume create ftpdata >/dev/null 2>&1 || true
            docker rm -f ftp >/dev/null 2>&1 || true

            docker pull crazymax/pure-ftpd:latest

            docker run -d \
              --name ftp \
              -p 2121:2100 \
              -p 30000-30010:30000-30010 \
              -e FTP_USER_NAME=${{ secrets.FTP_USER }} \
              -e FTP_USER_PASS=${{ secrets.FTP_PASS }} \
              -e FTP_USER_HOME=/home/ftpusers \
              -e PUBLICHOST=${{ secrets.FTP_SERVER_IP }} \
              -v ftpdata:/home/ftpusers \
              crazymax/pure-ftpd:latest
