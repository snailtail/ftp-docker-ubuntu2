name: Deploy FTP (pure-ftpd, CI-robust)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy FTP server over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_SERVER_IP: ${{ secrets.FTP_SERVER_IP }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: FTP_USER,FTP_PASS,FTP_SERVER_IP
          script: |
            set -euo pipefail

            IMAGE="crazymax/pure-ftpd:latest"
            NAME="ftp"

            HOST_CTRL_PORT=2121
            CONTAINER_CTRL_PORT=2100
            PASV_MIN=30000
            PASV_MAX=30009

            FTP_UID=1000
            FTP_GID=1000

            echo "[1/7] Create volumes (idempotent)"
            docker volume create ftpdata >/dev/null 2>&1 || true
            docker volume create ftpdb   >/dev/null 2>&1 || true

            echo "[2/7] Pull image"
            docker pull "$IMAGE"

            echo "[3/7] Replace container"
            docker rm -f "$NAME" >/dev/null 2>&1 || true

            docker run -d \
              --name "$NAME" \
              -p "${HOST_CTRL_PORT}:${CONTAINER_CTRL_PORT}" \
              -p "${PASV_MIN}-${PASV_MAX}:${PASV_MIN}-${PASV_MAX}" \
              -e "AUTH_METHOD=puredb" \
              -e "PASSIVE_IP=${FTP_SERVER_IP}" \
              -e "PASSIVE_PORT_RANGE=${PASV_MIN}:${PASV_MAX}" \
              -v ftpdata:/home/ftpusers \
              -v ftpdb:/data \
              "$IMAGE"

            echo "[4/7] Wait for Pure-FTPd to be running"
            for i in $(seq 1 30); do
              if docker exec "$NAME" sh -lc "pgrep -f pure-ftpd >/dev/null 2>&1"; then
                break
              fi
              sleep 1
            done

            echo "[5/7] Create or update FTP user (PureDB)"
            if docker exec "$NAME" sh -lc "pure-pw show \"${FTP_USER}\" >/dev/null 2>&1"; then
              echo "User exists -> updating password"
              printf '%s\n%s\n' "${FTP_PASS}" "${FTP_PASS}" | \
                docker exec -i "$NAME" sh -lc \
                "pure-pw passwd \"${FTP_USER}\" -m"
            else
              echo "User missing -> creating user"
              printf '%s\n%s\n' "${FTP_PASS}" "${FTP_PASS}" | \
                docker exec -i "$NAME" sh -lc \
                "pure-pw useradd \"${FTP_USER}\" -u ${FTP_UID} -g ${FTP_GID} -d /home/ftpusers -m"
            fi

            echo "[6/7] Verify user exists (fail deploy if not)"
            sleep 1
            docker exec "$NAME" sh -lc "pure-pw show \"${FTP_USER}\" >/dev/null"

            
            echo "[6.5] Ensure home directory ownership and permissions"
            docker exec "$NAME" sh -lc "chown -R ${FTP_UID}:${FTP_GID} /home/ftpusers"
            docker exec "$NAME" sh -lc "chmod 755 /home/ftpusers"

            echo "[7/7] Cleanup sensitive env"
            unset FTP_PASS
            unset FTP_USER

            echo "✅ FTP deploy successful"
            echo "Control port: ${HOST_CTRL_PORT}"
            echo "Passive ports: ${PASV_MIN}-${PASV_MAX}"
